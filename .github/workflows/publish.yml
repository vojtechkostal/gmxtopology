name: Publish Python Package

on:
  workflow_dispatch:
    inputs:
      repository:
        description: Package index to publish to
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi
  release:
    types:
      - published

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Check lightweight source distribution
        run: |
          python - <<'PY'
          from pathlib import Path
          from tarfile import open as open_tar

          archive = next(Path("dist").glob("*.tar.gz"))
          with open_tar(archive) as tar:
              names = tar.getnames()

          unexpected = [
              name
              for name in names
              if "/tests/" in name
              or "/examples/parameters/" in name
              or "/examples/topol" in name
          ]
          if unexpected:
              raise SystemExit(
                  "Large development files found in source distribution:\n"
                  + "\n".join(unexpected)
              )
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch' && inputs.repository == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/gmxtopology/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.repository == 'pypi')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/gmxtopology/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
